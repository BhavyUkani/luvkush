<div class="auth">
  <div class="auth__card">
    <a routerLink="/" class="auth__logo">
      <div class="auth__logo-mark">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 010 20A10 10 0 0112 2z"/><path d="M12 6c0 3.31-2.69 6-6 6"/><path d="M12 6c0 3.31 2.69 6 6 6"/></svg>
      </div>
      <span class="auth__logo-name">Luv Kush Natural<small>Ayurvedic Hair Care</small></span>
    </a>

    <h1 class="auth__title">Welcome back</h1>
    <p class="auth__sub">Sign in to your account to continue</p>

    @if (error()) {
      <div class="auth__error" role="alert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>
        {{ error() }}
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="field">
        <label class="field__label" for="login-email">Email address</label>
        <div class="field__input-wrap">
          <input
            id="login-email"
            type="email"
            formControlName="email"
            class="field__input"
            [class.field__input--invalid]="submitted && f.email.invalid"
            placeholder="you@example.com"
            autocomplete="email"
            inputmode="email" />
        </div>
        @if (submitted && f.email.invalid) {
          <span class="field__error">Please enter a valid email address</span>
        }
      </div>

      <div class="field">
        <label class="field__label" for="login-pw">
          Password
          <a routerLink="/forgot-password" class="field__forgot">Forgot password?</a>
        </label>
        <div class="field__input-wrap">
          <input
            id="login-pw"
            [type]="showPw() ? 'text' : 'password'"
            formControlName="password"
            class="field__input field__input--pw"
            [class.field__input--invalid]="submitted && f.password.invalid"
            placeholder="Enter your password"
            autocomplete="current-password" />
          <button type="button" class="field__pw-toggle" (click)="showPw.set(!showPw())" [attr.aria-label]="showPw() ? 'Hide password' : 'Show password'">
            @if (showPw()) {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M1 1l22 22"/></svg>
            } @else {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>
        @if (submitted && f.password.invalid) {
          <span class="field__error">Password is required</span>
        }
      </div>

      <div class="field" style="margin-bottom:0">
        <label class="checkbox-field">
          <input type="checkbox" formControlName="rememberMe" />
          Remember me for 30 days
        </label>
      </div>

      <button type="submit" class="auth-submit" [disabled]="loading()">
        @if (loading()) { <span class="spinner"></span> Signing in… }
        @else { Sign In }
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a routerLink="/register">Create one free</a>
    </p>
  </div>
</div>
